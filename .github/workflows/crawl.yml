name: Crawl

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'community-catalogs/**/organization-catalog.json'

jobs:
  crawl:
    if: github.repository == 'FIDEScommunity/fides-organization-catalog'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run crawl

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain data/ wordpress-plugin/fides-organization-catalog/data/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to commit."
          fi

      - name: Commit aggregated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/aggregated.json data/org-history-state.json wordpress-plugin/fides-organization-catalog/data/aggregated.json
          git commit -m "chore: update aggregated data [skip ci]"
          git push

      # Tells the production WordPress site to flush its aggregated.json cache
      # (Fides_Catalog_Source transient + options-backup) so freshly crawled
      # organizations show up in seconds instead of after the 6h TTL.
      # Set both `vars.WP_INVALIDATE_URL` and `secrets.WP_INVALIDATE_SECRET`
      # in the repo settings to enable. Forks / unconfigured repos skip
      # silently. A failed call does not break the workflow — production
      # falls back to its 6h TTL.
      - name: Notify production WordPress to flush catalog cache
        if: steps.changes.outputs.changed == 'true'
        env:
          WP_INVALIDATE_URL: ${{ vars.WP_INVALIDATE_URL }}
          WP_INVALIDATE_SECRET: ${{ secrets.WP_INVALIDATE_SECRET }}
          CATALOG_TYPE: organization
        run: |
          if [ -z "${WP_INVALIDATE_URL}" ] || [ -z "${WP_INVALIDATE_SECRET}" ]; then
            echo "Skipping: WP_INVALIDATE_URL/SECRET not configured for this repo."
            exit 0
          fi
          echo "Notifying ${WP_INVALIDATE_URL} (type=${CATALOG_TYPE})..."
          curl -fsS -X POST "${WP_INVALIDATE_URL}" \
            -H "X-FIDES-Catalog-Secret: ${WP_INVALIDATE_SECRET}" \
            --data-urlencode "type=${CATALOG_TYPE}" \
            -w '\nHTTP %{http_code}\n' \
            || echo "WP invalidate failed (non-fatal; production has 6h TTL fallback)"
