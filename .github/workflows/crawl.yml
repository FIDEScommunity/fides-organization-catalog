name: Crawl

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'community-catalogs/**/organization-catalog.json'

jobs:
  crawl:
    if: github.repository == 'FIDEScommunity/fides-organization-catalog'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run crawl

      - name: Commit aggregated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git status --porcelain data/ wordpress-plugin/fides-organization-catalog/data/ | grep -q .; then
            git add data/aggregated.json data/org-history-state.json wordpress-plugin/fides-organization-catalog/data/aggregated.json
            git commit -m "chore: update aggregated data [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
