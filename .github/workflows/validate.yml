name: Validate

on:
  push:
    paths:
      - 'community-catalogs/**/organization-catalog.json'
      - 'schemas/**'
  pull_request:
    paths:
      - 'community-catalogs/**/organization-catalog.json'
      - 'schemas/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run validate

      - run: npm test
